name: Lint skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill files
        run: |
          python3 - <<'PY'
          from pathlib import Path

          roots = [Path(".cursor/skills"), Path(".claude/skills")]
          missing_roots = [str(root) for root in roots if not root.exists()]
          if missing_roots:
              raise SystemExit(f"Missing skill roots: {', '.join(missing_roots)}")

          skill_files = []
          for root in roots:
              skill_files.extend(root.rglob("SKILL.md"))

          if not skill_files:
              raise SystemExit("No SKILL.md files found")

          bad = []
          for path in skill_files:
              text = path.read_text(encoding="utf-8")
              if not text.startswith("---"):
                  bad.append(f"{path}: missing frontmatter")

          if bad:
              raise SystemExit("\n".join(bad))

          print(f"Validated {len(skill_files)} skill files")
          PY

