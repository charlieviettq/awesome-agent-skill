name: Deploy marketplace

on:
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "registry/**"
      - "scripts/generate-catalog.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog
        run: |
          python3 scripts/generate-registry.py --check || python3 scripts/generate-registry.py
          python3 scripts/generate-quality.py || true
          python3 scripts/generate-catalog.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: catalog

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
