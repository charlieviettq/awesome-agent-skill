name: DataAgent Pro request
description: Request access to the DataAgent Kit Pro bundle (commercial)
title: "[DataAgent Pro] Access request — "
labels:
  - specflow-ai
  - dataagent
body:
  - type: markdown
    attributes:
      value: |
        **DataAgent Kit Pro** extends the free bundle with full data workflow skills (dashboards, viz, validation, SQL depth, xlsx).

        Free starter: `skillhub install-bundle dataagent-free . --format cursor`

  - type: input
    id: org
    attributes:
      label: Team or company
      placeholder: e.g. Data team @ FinCo
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: Contact email or GitHub handle
    validations:
      required: true

  - type: dropdown
    id: use-case
    attributes:
      label: Primary use case
      options:
        - Ad-hoc analysis + stakeholder reports
        - SQL / warehouse exploration
        - Notebook → spec → verify workflow
        - Team standardization (shared skills)
        - Other
    validations:
      required: true

  - type: dropdown
    id: seats
    attributes:
      label: Estimated seats
      options:
        - "1 (solo)"
        - "2–5"
        - "6–15"
        - "16+"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else we should know
      placeholder: Stack (BigQuery, Snowflake…), billing preference (invoice vs card)

  - type: checkboxes
    id: tried-free
    attributes:
      label: Free bundle
      options:
        - label: I tried dataagent-free or browsed the marketplace first
          required: false
