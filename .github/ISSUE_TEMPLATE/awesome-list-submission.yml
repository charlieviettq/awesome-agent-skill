name: Track awesome-list submission
description: Log a submission to an external awesome list or roundup
title: "[Distribution]: "
labels:
  - documentation
body:
  - type: input
    id: list-name
    attributes:
      label: List or channel name
      placeholder: e.g. sindresorhus/awesome subsection
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: List URL or PR link
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Planned
        - Submitted
        - Accepted
        - Rejected
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Category used, maintainer feedback, follow-up date
