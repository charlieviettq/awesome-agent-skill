<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill map</title>
  <desc id="desc">A domain map of agent skills grouped by workflow, code, data, content, operations, and orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.51 0 0 0 0 0.96 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="640" rx="36" fill="url(#bg)"/>
  <g opacity="0.32" stroke="#38BDF8" stroke-width="2">
    <path d="M600 305L240 160"/>
    <path d="M600 305L390 455"/>
    <path d="M600 305L610 120"/>
    <path d="M600 305L820 465"/>
    <path d="M600 305L950 165"/>
    <path d="M600 305L960 345"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="600" cy="305" r="86" fill="url(#node)"/>
    <text x="600" y="292" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="26" font-weight="800">Agent</text>
    <text x="600" y="325" text-anchor="middle" fill="#DBEAFE" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">Skills</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui" font-weight="700">
    <g transform="translate(92 112)">
      <rect width="296" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Core Workflow</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">specs, TDD, review, planning</text>
    </g>
    <g transform="translate(453 72)">
      <rect width="300" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Agent Systems</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">MCP, RAG, evals, context</text>
    </g>
    <g transform="translate(812 116)">
      <rect width="296" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Browser QA</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">gstack, ship, canary, design</text>
    </g>
    <g transform="translate(832 302)">
      <rect width="286" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Operations</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">reliability, security, launch</text>
    </g>
    <g transform="translate(660 432)">
      <rect width="318" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Role Playbooks</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">engineering, product, research</text>
    </g>
    <g transform="translate(214 430)">
      <rect width="324" height="96" rx="24" fill="#0B1220" stroke="#1E40AF"/>
      <text x="28" y="38" fill="#93C5FD" font-size="22">Data & Content</text>
      <text x="28" y="68" fill="#CBD5E1" font-size="15" font-weight="500">analysis, visualization, docs</text>
    </g>
  </g>
  <text x="600" y="594" text-anchor="middle" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Copy only what you need. Keep team-specific skills private.</text>
</svg>
